name: Test & Lint

# Triggers: when this workflow runs
on:
  push:
  pull_request:

# Jobs: units of work
jobs:
  test:
    # Runner: virtual machine to execute on
    runs-on: ubuntu-latest

    # Steps: sequential tasks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Run linter
        run: pnpm lint
